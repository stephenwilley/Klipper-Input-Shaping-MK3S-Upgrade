## moonraker-timelapse
##
## Klipper macro definitions required by the moonraker timelapse component.
## This file defines the macros that moonraker's timelapse.py registers
## on klippy_ready. Without these, Klipper will log "Unknown command" errors
## for _SET_TIMELAPSE_SETUP and HYPERLAPSE on every startup.
##
## Timelapse capture is still controlled by moonraker.conf [timelapse] settings.
## Setting enabled: False there disables frame capture without removing these macros.

[gcode_macro _SET_TIMELAPSE_SETUP]
description: Store timelapse config pushed from moonraker on klippy_ready
variable_enable: False
variable_verbose: False
variable_park: False
variable_parkpos: 'back_left'
variable_park_custom_pos_x: 0.0
variable_park_custom_pos_y: 0.0
variable_park_custom_pos_dz: 0.0
variable_travel_speed: 100
variable_retract_speed: 35
variable_extrude_speed: 35
variable_retract_distance: 0.0
variable_extrude_distance: 0.0
variable_park_time: 0.1
variable_fw_retract: False
gcode:
  {% set enable  = params.ENABLE           | default(0)           | int %}
  {% set verbose = params.VERBOSE          | default(0)           | int %}
  {% set park    = params.PARK_ENABLE      | default(0)           | int %}
  {% set pos     = params.PARK_POS         | default('back_left') | string | lower %}
  {% set cx      = params.CUSTOM_POS_X     | default(0.0)         | float %}
  {% set cy      = params.CUSTOM_POS_Y     | default(0.0)         | float %}
  {% set cdz     = params.CUSTOM_POS_DZ    | default(0.0)         | float %}
  {% set travel  = params.TRAVEL_SPEED     | default(100)         | int %}
  {% set retract = params.RETRACT_SPEED    | default(35)          | int %}
  {% set extrude = params.EXTRUDE_SPEED    | default(35)          | int %}
  {% set rd      = params.RETRACT_DISTANCE | default(0.0)         | float %}
  {% set ed      = params.EXTRUDE_DISTANCE | default(0.0)         | float %}
  {% set pt      = params.PARK_TIME        | default(0.1)         | float %}
  {% set fwr     = params.FW_RETRACT       | default(0)           | int %}
  SET_GCODE_VARIABLE MACRO=_SET_TIMELAPSE_SETUP VARIABLE=enable             VALUE={1 if enable  else 0}
  SET_GCODE_VARIABLE MACRO=_SET_TIMELAPSE_SETUP VARIABLE=verbose            VALUE={1 if verbose else 0}
  SET_GCODE_VARIABLE MACRO=_SET_TIMELAPSE_SETUP VARIABLE=park               VALUE={1 if park    else 0}
  SET_GCODE_VARIABLE MACRO=_SET_TIMELAPSE_SETUP VARIABLE=parkpos            VALUE='"{pos}"'
  SET_GCODE_VARIABLE MACRO=_SET_TIMELAPSE_SETUP VARIABLE=park_custom_pos_x  VALUE={cx}
  SET_GCODE_VARIABLE MACRO=_SET_TIMELAPSE_SETUP VARIABLE=park_custom_pos_y  VALUE={cy}
  SET_GCODE_VARIABLE MACRO=_SET_TIMELAPSE_SETUP VARIABLE=park_custom_pos_dz VALUE={cdz}
  SET_GCODE_VARIABLE MACRO=_SET_TIMELAPSE_SETUP VARIABLE=travel_speed       VALUE={travel}
  SET_GCODE_VARIABLE MACRO=_SET_TIMELAPSE_SETUP VARIABLE=retract_speed      VALUE={retract}
  SET_GCODE_VARIABLE MACRO=_SET_TIMELAPSE_SETUP VARIABLE=extrude_speed      VALUE={extrude}
  SET_GCODE_VARIABLE MACRO=_SET_TIMELAPSE_SETUP VARIABLE=retract_distance   VALUE={rd}
  SET_GCODE_VARIABLE MACRO=_SET_TIMELAPSE_SETUP VARIABLE=extrude_distance   VALUE={ed}
  SET_GCODE_VARIABLE MACRO=_SET_TIMELAPSE_SETUP VARIABLE=park_time          VALUE={pt}
  SET_GCODE_VARIABLE MACRO=_SET_TIMELAPSE_SETUP VARIABLE=fw_retract         VALUE={1 if fwr else 0}

[gcode_macro HYPERLAPSE]
description: Start/stop hyperlapse (timed frame capture)
variable_run: False
variable_cycle_time: 30
gcode:
  {% set action = params.ACTION | default('') | string | upper %}
  {% set cycle  = params.CYCLE  | default(30) | int %}
  {% if action == 'START' %}
    SET_GCODE_VARIABLE MACRO=HYPERLAPSE VARIABLE=cycle_time VALUE={cycle}
    SET_GCODE_VARIABLE MACRO=HYPERLAPSE VARIABLE=run        VALUE=True
    UPDATE_DELAYED_GCODE ID=_hyperlapse_timer DURATION={cycle}
    {% if printer["gcode_macro _SET_TIMELAPSE_SETUP"].verbose %}
      {action_respond_info("Hyperlapse: started, cycle=%ds" % cycle)}
    {% endif %}
  {% elif action == 'STOP' %}
    SET_GCODE_VARIABLE MACRO=HYPERLAPSE VARIABLE=run VALUE=False
    UPDATE_DELAYED_GCODE ID=_hyperlapse_timer        DURATION=0
    {% if printer["gcode_macro _SET_TIMELAPSE_SETUP"].verbose %}
      {action_respond_info("Hyperlapse: stopped")}
    {% endif %}
  {% else %}
    {action_respond_info("Hyperlapse: unknown action '%s'" % action)}
  {% endif %}

[delayed_gcode _hyperlapse_timer]
gcode:
  {% if printer["gcode_macro HYPERLAPSE"].run %}
    TIMELAPSE_TAKE_FRAME HYPERLAPSE=1
    UPDATE_DELAYED_GCODE ID=_hyperlapse_timer DURATION={printer["gcode_macro HYPERLAPSE"].cycle_time}
  {% endif %}

[gcode_macro TIMELAPSE_TAKE_FRAME]
description: Signal moonraker to capture a timelapse frame
variable_takingframe: False
gcode:
  {% set hyperlapse = params.HYPERLAPSE | default(0) | int %}
  {% set setup = printer["gcode_macro _SET_TIMELAPSE_SETUP"] %}
  {% if setup.enable %}
    {% if not printer["gcode_macro TIMELAPSE_TAKE_FRAME"].takingframe %}
      SET_GCODE_VARIABLE MACRO=TIMELAPSE_TAKE_FRAME VARIABLE=takingframe VALUE=True
      {% if setup.park and "xyz" in printer.toolhead.homed_axes %}
        {% set pos = setup.parkpos %}
        {% set maxz = printer.toolhead.axis_maximum.z %}
        {% set curz = printer.toolhead.position.z %}
        {% set dz   = setup.park_custom_pos_dz if pos == 'custom' else 1.0 %}
        {% set newz = [[curz + dz, 0]|max, maxz]|min %}
        {% if pos == 'custom' %}
          {% set px = setup.park_custom_pos_x %}
          {% set py = setup.park_custom_pos_y %}
        {% elif pos == 'front_left' %}
          {% set px = printer.toolhead.axis_minimum.x + 10 %}
          {% set py = printer.toolhead.axis_minimum.y + 10 %}
        {% elif pos == 'front_right' %}
          {% set px = printer.toolhead.axis_maximum.x - 10 %}
          {% set py = printer.toolhead.axis_minimum.y + 10 %}
        {% elif pos == 'back_left' %}
          {% set px = printer.toolhead.axis_minimum.x + 10 %}
          {% set py = printer.toolhead.axis_maximum.y - 10 %}
        {% elif pos == 'back_right' %}
          {% set px = printer.toolhead.axis_maximum.x - 10 %}
          {% set py = printer.toolhead.axis_maximum.y - 10 %}
        {% else %}
          {% set px = printer.toolhead.axis_maximum.x / 2 %}
          {% set py = printer.toolhead.axis_maximum.y / 2 %}
        {% endif %}
        SAVE_GCODE_STATE NAME=_timelapse_frame
        G90
        {% if setup.fw_retract %}
          G10
        {% elif setup.retract_distance > 0.0 %}
          M83
          G1 E-{setup.retract_distance} F{setup.retract_speed * 60}
        {% endif %}
        G1 Z{newz} F{setup.travel_speed * 60}
        G1 X{px} Y{py} F{setup.travel_speed * 60}
      {% endif %}
      {action_call_remote_method("timelapse_newframe",
                                 macropark=setup.park,
                                 hyperlapse=hyperlapse)}
    {% else %}
      {% if setup.verbose %}
        {action_respond_info("Timelapse: still taking previous frame, skipping")}
      {% endif %}
    {% endif %}
  {% else %}
    {% if setup.verbose %}
      {action_respond_info("Timelapse: disabled, frame ignored")}
    {% endif %}
  {% endif %}

[gcode_macro TIMELAPSE_RENDER]
description: Ask moonraker to render the timelapse video
gcode:
  {% if printer["gcode_macro _SET_TIMELAPSE_SETUP"].verbose %}
    {action_respond_info("Timelapse: rendering video")}
  {% endif %}
  {action_call_remote_method("timelapse_render")}
