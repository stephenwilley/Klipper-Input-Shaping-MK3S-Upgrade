##### Prusa MK3 (modified) — Klipper config

### UI and Built-in Macros (see macros.cfg for added macros)
[include mainsail.cfg]

### PRINTER - Machine Limits are set inside of Klipper rather than from PrusaSlicer
[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 4500
minimum_cruise_ratio:0.5
max_z_velocity: 12
max_z_accel: 750

## Z-OFFSET
## Set to the textured sheet calibration value. Sheet switching is handled by
## SET_SHEET_TEXTURED / SET_SHEET_SMOOTH macros, which store absolute offset values.
## PRINT_START subtracts this value internally so Klipper gets the correct delta.
[probe]
z_offset = 0.78

[save_variables]
filename: /opt/printer_data/config/saved_variables.cfg

[mcu]
serial: /dev/serial/by-id/usb-Prusa_Research__prusa3d.com__Original_Prusa_i3_MK3_CZPX5018X004XK00490-if00
restart_method: command

### CONTROL BOARD
[include einsy-rambo.cfg]

### BASE SETUP
[include steppers.cfg]
[include tmc2130.cfg]

### HOTEND, BED and EXTRUDER - 

[extruder]
rotation_distance: 22.95981632
control = pid
pid_kp = 22.417
pid_ki = 2.047
pid_kd = 61.366
pressure_advance: 0.05
min_extrude_temp: 170
min_temp: 0
max_temp: 285
full_steps_per_rotation: 200
max_extrude_only_distance: 200
max_extrude_cross_section: 50.0
max_extrude_only_velocity: 120.0
max_extrude_only_accel: 1250.0 #Limited to the retraction accel on the MK3.5

[heater_bed]
control = pid
pid_kp = 54.313
pid_ki = 0.885
pid_kd = 833.024

### MACROS
[include macros.cfg]

[gcode_macro _CLIENT_VARIABLE]
variable_park_at_cancel   : True  ; move head to park position on CANCEL_PRINT
variable_custom_park_dz   : 5.0   ; lift nozzle 5mm when parking on pause/cancel
variable_user_cancel_macro: "M84" ; disable steppers on cancel
gcode:

### INPUT SHAPING

#[include adxlmcu-BTT.cfg] # ONLY FOR USE DURING INPUT SHAPING TESTING - Leaving this on without the accelerometer plugged in will cause Klipper to not work.
[input_shaper]
shaper_type_x = 3hump_ei
shaper_freq_x = 101.4
shaper_type_y = ei
shaper_freq_y = 72.3

### OTHER FEATURES OR TUNING
[exclude_object]

### THIRD PARTY FEATURES
[include timelapse.cfg]

### MISC
[idle_timeout]
timeout: 1200 ; 20 minutes — long enough for manual colour changes

[safe_z_home]
home_xy_position: 11,6
speed: 50.0
z_hop: 15
z_hop_speed: 15.0
move_to_previous: False


