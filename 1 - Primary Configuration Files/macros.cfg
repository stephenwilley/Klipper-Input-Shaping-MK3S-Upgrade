# Print Start
[gcode_macro PRINT_START]
gcode:
    ; TEMPERATURE_WAIT is used instead of M109/M190 — Klipper's hysteresis is tight and the bed
    ; in particular can add minutes to startup time if using blocking heater waits.
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(215)|float %}
    {% set EXTRUDER_CAL_TEMP = params.EXTRUDER_CAL_TEMP|default(190)|int %}

    M117 Preheating...
    M140 S{BED_TEMP}                 ; Start bed heating and don't wait
    M104 S{EXTRUDER_CAL_TEMP}        ; Start heating extruder to safe temp and don't wait
    {% set sheet_offset = printer.save_variables.variables.sheet_offset|default(0.80)|float %}
    {% set probe_offset = printer.configfile.settings.probe.z_offset|float %}
    SET_GCODE_OFFSET Z={sheet_offset - probe_offset} ; Apply sheet offset relative to probe calibration
    BED_MESH_CLEAR                   ; Clear bed mesh
    M117 Homing...
    G28                              ; Home the printer
    G90                              ; Absolute positioning mode
    G0 Z50 F4000                     ; Raise up for nozzle cleaning while bed heats (keeps PINDA cool)
    M117 Waiting for bed...
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED_TEMP-1} MAXIMUM={BED_TEMP+3}
    ; PINDA is temperature-sensitive — soak it at the probe position before mesh calibration
    ; so the offset is consistent. Replace with SuperPINDA when hardware arrives.
    G0 X20 Y60 Z0.15                 ; Move to PINDA preheat position
    {% for timer in range(30,0,-1) %}
        M117 PINDA Heatsoak...{timer|int}
        G4 P1000
    {% endfor %}
    M117 Probing bed...
    BED_MESH_CALIBRATE ADAPTIVE=1    ; Measure bed mesh
    M117 Heating...
    M104 S{EXTRUDER_TEMP}            ; Heat extruder to final temp and don't wait
    G0 X0 Y-4 Z15 F4000              ; Move to purge starting position
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER_TEMP-1} MAXIMUM={EXTRUDER_TEMP+5}
    M117                             ; Clear message on LCD
    PRUSA_LINE_PURGE

# Print End
[gcode_macro PRINT_END]
gcode:
    M83 ; extruder relative mode
    G1 E-1 F300 ; retract filament a bit for minimizing ooze
    G90 ; absolute positioning
    G0 Z{[[printer.toolhead.position.z + 5, printer.toolhead.axis_maximum.z]|min, 50]|max} F1200 ; park at least 50mm off the bed
    G0 X5 Y{printer.toolhead.axis_maximum.y} F6000
    M84 X Y E    ; Disable steppers
    TURN_OFF_HEATERS    ; Disable heaters
    M106 S0     ; Disable fans
    BED_MESH_CLEAR    ; Clear bed mesh

[gcode_macro PRUSA_LINE_PURGE]
## Purge line macro based on the MK4
gcode:
    SAVE_GCODE_STATE NAME=prusa_line_purge
    M83 ; extruder relative mode
    G0 X0 Y-4 Z15 F4000; move to the purge starting position
    G92 E0 ; reset extruder position
    G1 E3 ; prime hotend
    G0 E7 X15 Z0.2 F500 ; purge
    G0 X25 E4 F500 ; purge
    G0 X35 E4 F650 ; purge
    G0 X45 E4 F800 ; purge
    G0 X48 Z0.05 F8000 ; wipe, move close to the bed
    G0 X51 Z0.2 F8000 ; wipe, move quickly away from the bed
    RESTORE_GCODE_STATE NAME=prusa_line_purge
    G92 E0 ; reset extruder position

## Filament handling

[gcode_macro LOAD_FILAMENT]
description: Heat and load filament
gcode:
  SAVE_GCODE_STATE NAME=load_state
  M117 Setting temps...
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=60
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET=220
  M117 Moving extruder...
  {% if "z" not in printer.toolhead.homed_axes %}
    M117 Homing...
    G28
  {% endif %}
  G90 ; absolute positioning
  G0 Z{[[printer.toolhead.position.z + 5, printer.toolhead.axis_maximum.z]|min, 50]|max} F1200 ; park at least 50mm off the bed
  G91
  M117 Waiting for temp...
  TEMPERATURE_WAIT SENSOR=extruder MINIMUM=219
  M117 Loading filament...
  # Load the filament into the hotend area.
  G92 E0.0
  G91
  G1 E75 F400
  G1 E27 F150
  G90
  G92 E0.0
  M400
  M117 Filament loaded!
  RESTORE_GCODE_STATE NAME=load_state

[gcode_macro _UNLOAD_FILAMENT]
# Private implementation — called by UNLOAD_FILAMENT and M600.
# RAM_DISTANCE is kept as a param so M600 can pass a shorter distance (7mm vs default 20mm).
gcode:
  # Default ram distance and sequence copied from MK3.5 in https://github.com/prusa3d/Prusa-Firmware-Buddy/include/marlin/Configuration_MK3.5_adv.h
  {% set RAM_DISTANCE = params.RAM_DISTANCE|default(20)|int %}
  SAVE_GCODE_STATE NAME=unload_state
  G91
  {% if printer.extruder.can_extrude|lower == 'false' %}
    M117 Heating...
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=220
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=219
  {% endif %}
  M117 Unloading filament...
  G92 E0.0                      ; reset extruder distance
  G91                           ; relative positioning
  G1 E{RAM_DISTANCE} F1500      ; ram to build up pressure
  G1 E-50 F2700                 ; fast, long retract to thin the whisp
  G1 E-4 F100                   ; slow retract to break the whisp
  G1 E-50 F1500                 ; move filament past gears
  G92 E0.0                      ; reset extruder distance
  M400                          ; wait for planner to flush
  M117 Remove Filament Now!
  M300 S300 P1000               ; beep
  M117 Filament unloaded!
  RESTORE_GCODE_STATE NAME=unload_state

[gcode_macro UNLOAD_FILAMENT]
description: Heat and unload filament
gcode:
  _UNLOAD_FILAMENT RAM_DISTANCE=20

## Bed sheet selection

[gcode_macro SET_SHEET_TEXTURED]
description: Select textured PEI sheet (z-offset 0.80)
gcode:
    SAVE_VARIABLE VARIABLE=sheet_offset VALUE=0.80
    M117 Sheet: Textured

[gcode_macro SET_SHEET_SMOOTH]
description: Select smooth PEI sheet (z-offset 0.47)
gcode:
    SAVE_VARIABLE VARIABLE=sheet_offset VALUE=0.47
    M117 Sheet: Smooth

## Preheat presets

[gcode_macro PREHEAT_PLA]
description: Preheat for PLA (bed 60, nozzle 215)
gcode:
    M140 S60
    M104 S215

[gcode_macro PREHEAT_PETG]
description: Preheat for PETG (bed 90, nozzle 240)
gcode:
    M140 S90
    M104 S240

[gcode_macro PREHEAT_TPU]
description: Preheat for TPU (bed 50, nozzle 190)
gcode:
    M140 S50
    M104 S190

## Utilities

# Color change or filament runout
[gcode_macro M600]
description: Color change or filament runout
gcode:
    # Default to the middle front of the bed. MK4 likes the right side but with the MK3 you might need access
    #  to the idler to unjam filament during a runout.
    #
    # No Z specified here since PAUSE hands over to _TOOLHEAD_PARK_PAUSE_CANCEL which doesn't take a Z argument.
    # If you want to change the amount of Z lift for parking, change the value of 'custom_park_dz' in printer.cfg.
    #
    # If a manual Z move is done, its not possible to know the restore context since this is generally followed
    #  by an asynchronous filament load and resume.
    {% set X = params.X|default(printer.toolhead.axis_maximum.x / 2)|float %}
    {% set Y = params.Y|default(-4)|float %}
    PAUSE X={X} Y={Y}
    _UNLOAD_FILAMENT RAM_DISTANCE=7
    M117 Swap filament now

[delayed_gcode clear_display]
initial_duration: 0.
gcode:
  M117

## Legacy macros from original dz0ny repository

[gcode_macro G80]
gcode:
    M117 Bed leveling
    BED_MESH_CALIBRATE
    G1 X0 Y0 Z0.4 F4000
    M117
    M400

[gcode_macro G81]
gcode:
 BED_MESH_OUTPUT

[gcode_macro M300]
gcode:
    # Use a default 1kHz tone if S is omitted.
    {% set S = params.S|default(1000)|int %}
    # Use a 10ms duration is P is omitted.
    {% set P = params.P|default(100)|int %}
    SET_PIN PIN=BEEPER_pin VALUE=0.5 CYCLE_TIME={ 1.0/S if S > 0 else 1 }
    G4 P{P}
    SET_PIN PIN=BEEPER_pin VALUE=0

# M73 Display Updates
[gcode_macro M73]
rename_existing: M73.1
variable_p: 0.0
variable_r: 0.0
gcode:
  {% set P = params.P|default(0)|int %}
  {% set R = params.R|default(0)|int %}
  M73.1 P{P}
  SET_GCODE_VARIABLE MACRO=M73 VARIABLE=p VALUE={P}
  SET_GCODE_VARIABLE MACRO=M73 VARIABLE=r VALUE={R}
